<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Bệnh viện 199</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      background: linear-gradient(135deg, #006633 0%, #008a4f 100%);
      font-family: 'Lexend Deca', sans-serif;
    }
    .login-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .btn-login {
      background: linear-gradient(135deg, #006633 0%, #008a4f 100%);
      border: none;
      font-weight: 600;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,102,51,0.4);
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100">

  <div class="login-card p-5" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-4">
      <img src="images/navbarlogosmall.png" alt="Bệnh viện 199" style="height: 80px;" class="mb-3">
      <h3 class="fw-bold text-success">ĐĂNG NHẬP HỆ THỐNG</h3>
      <p class="text-muted">Bệnh viện Đa khoa 199</p>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">📧 Email:</label>
        <input type="email" id="loginEmail" class="form-control form-control-lg" 
               placeholder="Nhập email" required>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">🔒 Mật khẩu:</label>
        <input type="password" id="loginPassword" class="form-control form-control-lg" 
               placeholder="Nhập mật khẩu" required>
      </div>

      <button type="submit" class="btn btn-login text-white w-100 py-2 fs-5">
        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="text-muted">Chưa có tài khoản? 
        <a href="#" onclick="switchToRegister()" class="text-success fw-semibold text-decoration-none">Đăng ký ngay</a>
      </p>
    </div>

    <div id="message" class="alert alert-danger mt-3 d-none"></div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
